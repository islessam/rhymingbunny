<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhyming Dust Bunnies</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 & ReactDOM 18 CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <style>
    @keyframes wiggle {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .animate-wiggle {
      animation: wiggle 0.35s ease-in-out infinite;
    }
    .animate-shake {
      animation: shake 0.2s ease-in-out 2;
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .animate-scale-up {
      animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    /* Simple custom font support */
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-[#f3e8ff] to-[#e9d5ff] min-h-screen">

  <!-- React Root Element -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Word Database organized by Rime groups
    const WORD_DATABASE = [
      // 1. Green Bunny (Ed) - 3 Quizzes
      {
        id: 'ED_01',
        helper: 'Ed',
        rime: 'at',
        target: 'cat',
        emoji: '🐱',
        rhymes: ['hat', 'mat', 'rat', 'bat', 'fat'],
        odd: 'dog'
      },
      {
        id: 'ED_02',
        helper: 'Ed',
        rime: 'ug',
        target: 'bug',
        emoji: '🐛',
        rhymes: ['rug', 'mug', 'hug', 'jug', 'tug'],
        odd: 'pig'
      },
      {
        id: 'ED_03',
        helper: 'Ed',
        rime: 'an',
        target: 'can',
        emoji: '🥫',
        rhymes: ['fan', 'man', 'pan', 'van', 'ran'],
        odd: 'fox'
      },

      // 2. Purple Bunny (Ned) - 3 Quizzes
      {
        id: 'NED_01',
        helper: 'Ned',
        rime: 'ar',
        target: 'car',
        emoji: '🚗',
        rhymes: ['far', 'bar', 'jar', 'tar', 'star'],
        odd: 'toy'
      },
      {
        id: 'NED_02',
        helper: 'Ned',
        rime: 'ap',
        target: 'map',
        emoji: '🗺️',
        rhymes: ['cap', 'tap', 'lap', 'nap', 'gap'],
        odd: 'bus'
      },
      {
        id: 'NED_03',
        helper: 'Ned',
        rime: 'ad',
        target: 'sad',
        emoji: '😢',
        rhymes: ['mad', 'dad', 'bad', 'pad', 'lad'],
        odd: 'pin'
      },

      // 3. Red Bunny (Ted) - 3 Quizzes
      {
        id: 'TED_01',
        helper: 'Ted',
        rime: 'in',
        target: 'fin',
        emoji: '🐟',
        rhymes: ['pin', 'bin', 'tin', 'win', 'spin'],
        odd: 'cat'
      },
      {
        id: 'TED_02',
        helper: 'Ted',
        rime: 'en',
        target: 'hen',
        emoji: '🐔',
        rhymes: ['pen', 'ten', 'men', 'den', 'ben'],
        odd: 'wig'
      },
      {
        id: 'TED_03',
        helper: 'Ted',
        rime: 'et',
        target: 'vet',
        emoji: '🥼',
        rhymes: ['wet', 'net', 'pet', 'jet', 'let'],
        odd: 'sun'
      },

      // 4. Blue Bunny (Bob) - 3 Quizzes
      {
        id: 'BOB_01',
        helper: 'Bob',
        rime: 'un',
        target: 'sun',
        emoji: '☀️',
        rhymes: ['run', 'fun', 'gun', 'bun', 'pun'],
        odd: 'hot'
      },
      {
        id: 'BOB_02',
        helper: 'Bob',
        rime: 'ot',
        target: 'pot',
        emoji: '🍲',
        rhymes: ['hot', 'cot', 'dot', 'not', 'lot'],
        odd: 'pig'
      },
      {
        id: 'BOB_03',
        helper: 'Bob',
        rime: 'op',
        target: 'top',
        emoji: '🔝',
        rhymes: ['mop', 'hop', 'pop', 'cop', 'sop'],
        odd: 'ten'
      }
    ];

    // Character Profiles
    const CHARACTER_INFO = {
      Ed: { name: 'Ed', color: 'green', border: 'border-emerald-400', bg: 'bg-emerald-100', text: 'text-emerald-600', image: 'Ed.jpg', fallbackEmoji: '🟢' },
      Ned: { name: 'Ned', color: 'purple', border: 'border-purple-400', bg: 'bg-purple-100', text: 'text-purple-600', image: 'Ned.jpg', fallbackEmoji: '🟣' },
      Ted: { name: 'Ted', color: 'red', border: 'border-red-400', bg: 'bg-red-100', text: 'text-red-600', image: 'Ted.jpg', fallbackEmoji: '🔴' },
      Bob: { name: 'Bob', color: 'blue', border: 'border-sky-400', bg: 'bg-sky-100', text: 'text-sky-600', image: 'Bob.jpg', fallbackEmoji: '🔵' }
    };

    const PlayIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="currentColor" className="ml-2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    );

    const Volume2Icon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="animate-pulse">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    );

    const HomeIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    );

    const TrophyIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-600">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
        <path d="M12 2a7 7 0 0 0-7 7c0 3.18 2.12 5.86 5 6.71V2h2z"/>
      </svg>
    );

    const RefreshCwIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
    );

    const RotateCcwIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="animate-spin">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    );

    function App() {
      const [screen, setScreen] = useState('LOBBY'); // LOBBY, STAGE_SELECT, GAME, END, GRAND_END
      const [currentSetIdx, setCurrentSetIdx] = useState(0);
      const [selectedCharacter, setSelectedCharacter] = useState(null);
      const [clearedCharacters, setClearedCharacters] = useState([]); 
      
      const [gameState, setGameState] = useState({
        shuffledBunnies: [],
        speakingBunnyIdx: -1,
        hasSpokenIntro: false,
        answeredCorrectly: null, // null, true (O), false (X)
        showRimeHighlight: false,
        clickedBunny: null
      });

      const audioCtxRef = useRef(null);

      const unlockAudioEngine = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext && !audioCtxRef.current) {
            audioCtxRef.current = new AudioContext();
          }
        } catch (e) {
          console.warn("Web Audio API is not supported", e);
        }

        if (window.speechSynthesis) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance('');
          utterance.lang = 'en-US';
          window.speechSynthesis.speak(utterance);
        }
      };

      // Sound synthesizer: Xylophone (Correct)
      const playXylophoneSound = () => {
        try {
          const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
          if (!audioCtxRef.current) audioCtxRef.current = ctx;
          
          const now = ctx.currentTime;
          const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C Major chord arpeggio
          
          frequencies.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + index * 0.08);
            
            gainNode.gain.setValueAtTime(0.15, now + index * 0.08);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.25);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.3);
          });
        } catch (e) {
          console.warn("Failed to play sound", e);
        }
      };

      // Sound synthesizer: Try again buzzer
      const playTryAgainSound = () => {
        try {
          const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
          if (!audioCtxRef.current) audioCtxRef.current = ctx;
          
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, now);
          osc.frequency.linearRampToValueAtTime(110, now + 0.3);
          
          gainNode.gain.setValueAtTime(0.18, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          
          osc.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          osc.start(now);
          osc.stop(now + 0.35);
        } catch (e) {
          console.warn(e);
        }
      };

      // Sound synthesizer: Grand finale arpeggios
      const playGrandFinaleSound = () => {
        try {
          const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
          if (!audioCtxRef.current) audioCtxRef.current = ctx;
          
          const now = ctx.currentTime;
          const chords = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; 
          
          chords.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + index * 0.08);
            
            gainNode.gain.setValueAtTime(0.12, now + index * 0.08);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.55);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.6);
          });
        } catch (e) {
          console.warn(e);
        }
      };

      const speakEnglish = (text, onEndCallback) => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';

        const voices = window.speechSynthesis.getVoices();
        
        // Match a natural clear voice
        const preferredVoice = voices.find(v => v.lang.includes('en-US') && (
          v.name.toLowerCase().includes('natural') ||
          v.name.toLowerCase().includes('google') ||
          v.name.toLowerCase().includes('microsoft') ||
          v.name.toLowerCase().includes('samantha') ||
          v.name.toLowerCase().includes('daniel')
        )) || voices.find(v => v.lang.includes('en-US')) || voices[0];
        
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }
        
        utterance.pitch = 1.0; 
        utterance.rate = 0.9; 

        if (onEndCallback) {
          utterance.onend = onEndCallback;
        }
        window.speechSynthesis.speak(utterance);
      };

      const getSelectedCampaign = () => {
        if (!selectedCharacter) return [];
        return WORD_DATABASE.filter(q => q.helper === selectedCharacter);
      };

      const setupGameRound = (setIdx) => {
        const campaign = getSelectedCampaign();
        const currentSet = campaign[setIdx];
        if (!currentSet) return;
        
        const selectedRhymeWords = [...currentSet.rhymes]
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);

        const bunnies = [
          { name: 'Ed', word: selectedRhymeWords[0], isOdd: false },
          { name: 'Ned', word: selectedRhymeWords[1], isOdd: false },
          { name: 'Ted', word: selectedRhymeWords[2], isOdd: false },
          { name: 'Bob', word: currentSet.odd, isOdd: true }
        ];

        const shuffledBunnies = [...bunnies].sort(() => Math.random() - 0.5);

        setGameState({
          shuffledBunnies,
          speakingBunnyIdx: -1,
          hasSpokenIntro: false,
          answeredCorrectly: null,
          showRimeHighlight: false,
          clickedBunny: null
        });
      };

      const playIntroAndReadWords = () => {
        const campaign = getSelectedCampaign();
        const currentSet = campaign[currentSetIdx];
        if (!currentSet) return;
        const introText = `${currentSet.target}. Find the bunny that says the wrong word!`;
        
        speakEnglish(introText, () => {
          readBunniesOneByOne(0);
        });
      };

      const readBunniesOneByOne = (index) => {
        if (index >= 4) {
          setGameState(prev => ({ ...prev, speakingBunnyIdx: -1, hasSpokenIntro: true }));
          return;
        }

        setGameState(prev => ({ ...prev, speakingBunnyIdx: index }));
        const currentBunny = gameState.shuffledBunnies[index];
        const speechText = currentBunny.word;
        
        speakEnglish(speechText, () => {
          readBunniesOneByOne(index + 1);
        });
      };

      useEffect(() => {
        if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = () => {};
        }
      }, []);

      useEffect(() => {
        if (screen === 'GAME' && selectedCharacter) {
          setupGameRound(currentSetIdx);
        }
      }, [screen, currentSetIdx, selectedCharacter]);

      useEffect(() => {
        if (screen === 'GAME' && gameState.shuffledBunnies.length > 0 && !gameState.hasSpokenIntro) {
          const timer = setTimeout(() => {
            playIntroAndReadWords();
          }, 600);
          return () => clearTimeout(timer);
        }
      }, [screen, gameState.shuffledBunnies]);

      const handleStartLobby = () => {
        unlockAudioEngine();
        setScreen('STAGE_SELECT');
      };

      const handleSelectCharacter = (charName) => {
        unlockAudioEngine();
        setSelectedCharacter(charName);
        setCurrentSetIdx(0);
        setScreen('GAME');
      };

      const handleReplayAudio = () => {
        unlockAudioEngine();
        setGameState(prev => ({ ...prev, hasSpokenIntro: false }));
        playIntroAndReadWords();
      };

      const handleBunnyClick = (bunny, idx) => {
        if (gameState.answeredCorrectly !== null) return;
        unlockAudioEngine();

        setGameState(prev => ({ ...prev, clickedBunny: bunny.name }));
        const campaign = getSelectedCampaign();

        if (bunny.isOdd) {
          playXylophoneSound();
          setGameState(prev => ({ 
            ...prev, 
            answeredCorrectly: true,
            showRimeHighlight: true 
          }));

          setTimeout(() => {
            if (currentSetIdx < campaign.length - 1) {
              setCurrentSetIdx(prev => prev + 1);
              setScreen('GAME');
            } else {
              const nextCleared = [...clearedCharacters];
              if (!nextCleared.includes(selectedCharacter)) {
                nextCleared.push(selectedCharacter);
              }
              setClearedCharacters(nextCleared);

              if (nextCleared.length === 4) {
                playGrandFinaleSound();
                setScreen('GRAND_END');
              } else {
                setScreen('END');
              }
            }
          }, 1500);

        } else {
          playTryAgainSound();
          setGameState(prev => ({ 
            ...prev, 
            answeredCorrectly: false,
            showRimeHighlight: true 
          }));

          setTimeout(() => {
            setGameState(prev => ({ ...prev, answeredCorrectly: null, clickedBunny: null }));
          }, 1200);
        }
      };

      const handleBackToStageSelect = () => {
        unlockAudioEngine();
        setCurrentSetIdx(0);
        setSelectedCharacter(null);
        setScreen('STAGE_SELECT');
      };

      const handleResetGameFully = () => {
        unlockAudioEngine();
        setCurrentSetIdx(0);
        setSelectedCharacter(null);
        setClearedCharacters([]);
        setScreen('LOBBY');
      };

      // Rime emphasis rendering helper
      const renderCvcWord = (word, rime, forceHighlight = false) => {
        if (!forceHighlight && !gameState.showRimeHighlight) {
          return <span className="font-bold">{word}</span>;
        }

        if (word.endsWith(rime)) {
          const root = word.slice(0, word.length - rime.length);
          return (
            <span className="font-bold">
              {root}
              <span className="text-red-500 font-extrabold">{rime}</span>
            </span>
          );
        }

        return <span className="font-bold text-slate-400">{word}</span>;
      };

      const campaign = getSelectedCampaign();
      const currentSet = campaign[currentSetIdx];

      return (
        <div className="min-h-screen flex flex-col justify-between font-sans overflow-x-hidden text-gray-800">
          
          {/* HEADER SECTION */}
          <header className="w-full bg-white/75 backdrop-blur-md py-4 px-6 border-b border-purple-200 flex items-center justify-between shadow-sm z-10">
            <div className="flex items-center gap-2 cursor-pointer" onClick={handleResetGameFully}>
              <span className="text-2xl">🐰</span>
              <h1 className="text-xl md:text-2xl font-black tracking-tight text-purple-700 select-none">
                Rhyming Dust Bunnies
              </h1>
            </div>
            {screen !== 'LOBBY' && (
              <div className="flex gap-2">
                {screen !== 'STAGE_SELECT' && (
                  <button
                    onClick={handleBackToStageSelect}
                    className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-purple-100 hover:bg-purple-200 text-purple-700 text-xs md:text-sm font-bold transition-all active:scale-95"
                  >
                    <span>Stage Select</span>
                  </button>
                )}
                <button
                  onClick={handleResetGameFully}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-red-100 hover:bg-red-200 text-red-700 text-xs md:text-sm font-bold transition-all active:scale-95"
                >
                  <HomeIcon />
                  <span className="hidden sm:inline">Reset All</span>
                </button>
              </div>
            )}
          </header>

          {}
          <main className="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center items-center">
            
            {/* ==================== [SCREEN 1: MAIN LOBBY] ==================== */}
            {screen === 'LOBBY' && (
              <div className="flex flex-col items-center justify-center text-center py-8 space-y-8 animate-fade-in w-full max-w-md">
                
                <div className="bg-white rounded-3xl p-6 shadow-xl border-4 border-purple-300 w-full relative">
                  <div className="absolute -top-6 -right-6 text-5xl animate-bounce">✨</div>
                  <div className="absolute -bottom-6 -left-6 text-5xl animate-pulse">🐇</div>
                  
                  <h2 className="text-4xl md:text-5xl font-black text-purple-600 leading-tight tracking-wide drop-shadow-md">
                    Rhyming<br />
                    <span className="text-pink-500">Dust Bunnies</span>
                  </h2>
                  <p className="mt-3 text-gray-600 font-semibold text-sm md:text-base">
                    Find the dust bunny that says the wrong word!
                  </p>
                </div>

                <button
                  onClick={handleStartLobby}
                  className="w-24 h-24 md:w-28 md:h-28 rounded-full bg-gradient-to-tr from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white flex items-center justify-center shadow-lg hover:shadow-2xl active:scale-90 transition-all cursor-pointer animate-bounce duration-1000 border-4 border-white"
                  aria-label="Start Game"
                >
                  <PlayIcon />
                </button>

                <span className="text-xs bg-purple-200 text-purple-800 font-bold px-3 py-1.5 rounded-full animate-pulse">
                  Tap Play to Start! 🔊
                </span>
              </div>
            )}

            {/* ==================== [SCREEN 2: STAGE SELECT] ==================== */}
            {screen === 'STAGE_SELECT' && (
              <div className="w-full text-center space-y-6 animate-fade-in">
                <div className="space-y-2">
                  <h3 className="text-2xl md:text-3xl font-extrabold text-purple-800">
                    Choose your Favorite Bunny Stage!
                  </h3>
                  <p className="text-gray-600 font-semibold text-sm md:text-base">
                    Each helper has a different set of 3 fun rhyming quizzes!
                  </p>
                </div>

                <div className="inline-flex items-center gap-2 bg-purple-200 text-purple-950 px-4 py-2 rounded-full font-black text-sm shadow-inner">
                  <TrophyIcon />
                  <span>Total Progress: {clearedCharacters.length} / 4 Cleared</span>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto pt-4">
                  {Object.keys(CHARACTER_INFO).map((key) => {
                    const char = CHARACTER_INFO[key];
                    const isCleared = clearedCharacters.includes(char.name);

                    return (
                      <button
                        key={char.name}
                        onClick={() => handleSelectCharacter(char.name)}
                        className={`bg-white rounded-2xl p-4 border-4 transition-all hover:-translate-y-2 active:scale-95 flex flex-col items-center shadow-md hover:shadow-xl group relative ${
                          isCleared ? 'border-yellow-400 bg-yellow-50/40' : 'border-dashed border-purple-200 hover:border-purple-500'
                        }`}
                      >
                        {isCleared && (
                          <div className="absolute top-2 right-2 bg-yellow-400 text-yellow-950 text-xs font-black px-2 py-0.5 rounded-full flex items-center gap-1 shadow-md z-10 animate-bounce">

                  <div className="grid grid-cols-4 gap-3 bg-white/70 p-4 rounded-2xl border-2 border-yellow-300">
